const $ = (s, el = document) => el.querySelector(s);
const $$ = (s, el = document) => Array.from(el.querySelectorAll(s));

let state = window.DialedData.loadData();
function persist() { window.DialedData.saveData(state); }

const routes = {
  home: renderHome,
  program: renderProgram,
  appointments: renderAppointments,
  markers: renderMarkers,
  circadian: renderCircadian,
  food: renderFood,
  recipes: renderRecipes,
  library: renderLibrary,
};

function setRoute(name) {
  const r = routes[name] ? name : 'home';
  history.replaceState(null, '', '#' + r);
  $$('.sidebar a').forEach(a => a.classList.toggle('active', a.dataset.route === r));
  $('#main').innerHTML = '';
  routes[r]($('#main'));
}
$$('.sidebar a').forEach(a => a.addEventListener('click', e => { e.preventDefault(); setRoute(a.dataset.route); }));
window.addEventListener('hashchange', () => setRoute(location.hash.replace('#','')));

}

// ---------- My labs ----------
function renderMarkers(root) {
  root.innerHTML = `${header('My labs', 'Your trend lines, in plain sight.')}<div id="m-out"></div>`;
  $('#m-out').innerHTML = `<div class="grid-2">${me.bloodMarkers.map(m => markerCard(m)).join('')}</div>`;
}

function markerCard(m) {
  const latest = m.history[m.history.length - 1];
  const first = m.history[0];
  const delta = latest.value - first.value;
  const lower = m.lowerIsBetter;
  const onTrack = lower ? delta < 0 : delta > 0;
  const max = Math.max(...m.history.map(h => h.value), m.goal);
  const min = Math.min(...m.history.map(h => h.value), 0);
  const W=320,H=80,pad=8;
  const xs = m.history.map((_, i) => pad + (i / Math.max(1, m.history.length - 1)) * (W - 2*pad));
  const yOf = v => H - pad - ((v - min) / Math.max(0.0001, (max - min))) * (H - 2*pad);
  const points = m.history.map((h, i) => `${xs[i]},${yOf(h.value)}`).join(' ');
  const goalY = yOf(m.goal);
  return `<div class="card-white">
    <div class="row-between" style="margin-bottom:8px">
      <div>
        <h4>${escapeHtml(m.name)}</h4>
        <div class="muted" style="font-size:13px">Goal: ${m.lowerIsBetter ? '< ' : '≥ '}${m.goal} ${escapeHtml(m.unit)}</div>
      </div>
      <div class="text-right">
        <div style="font-family:var(--font-financier-display);font-size:34px">${latest.value}</div>
        <div style="color:${onTrack ? '#3a7a3a' : '#b05a36'};font-size:13px">${onTrack ? '↑ on track' : 'attention'} · ${delta > 0 ? '+' : ''}${delta.toFixed(1)}</div>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px;background:var(--color-cream-canvas);border-radius:8px">
      <line x1="0" y1="${goalY}" x2="${W}" y2="${goalY}" stroke="#808988" stroke-width="0.5" stroke-dasharray="2 3"/>
      <polyline points="${points}" fill="none" stroke="#b05a36" stroke-width="2"/>
      ${m.history.map((h, i) => `<circle cx="${xs[i]}" cy="${yOf(h.value)}" r="3" fill="#b05a36"/>`).join('')}
    </svg>
  </div>`;
}

    'default': DEFAULT_SERVINGS,
    'high-protein': { ...DEFAULT_SERVINGS, ribeye: 3, ground: 5, salmon: 3, eggs: 18, chicken: 5, liver: 2 },
    'thrifty':      { ...DEFAULT_SERVINGS, ribeye: 1, salmon: 1, ground: 5, chicken: 5, eggs: 18, sardines: 4, asparagus: 2, berries: 3 },
  };

  const renderServings = () => {
    const cats = {};
    FOOD_CATALOG.forEach(item => {
      cats[item.category] = cats[item.category] || [];
      cats[item.category].push(item);
    });
    $('#servings-list').innerHTML = Object.entries(cats).map(([cat, items]) => `
      <div>
        <div class="mono" style="margin-bottom:6px">${escapeHtml(cat)}</div>
        ${items.map(item => `
          <div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--color-warm-mist)">
            <div>
              <div style="font-weight:500">${escapeHtml(item.name)}</div>
              <div class="muted" style="font-size:13px">${item.serving} ${item.unit}/serving · ${fmtMoney(item.prices[source])}/${item.unit}</div>
            </div>
            <input type="number" min="0" step="1" value="${servings[item.id] ?? 0}" data-item="${item.id}" class="input" style="max-width:90px;text-align:center;padding:6px 12px"/>
          </div>
        `).join('')}
      </div>
    `).join('');
    $$('[data-item]').forEach(i => i.addEventListener('input', () => {
      servings[i.dataset.item] = Math.max(0, parseFloat(i.value) || 0);
      renderSummary();
    }));
  };

  const renderSummary = () => {
    const list = buildGroceryList(source, servings);
    const budget = me.foodBudget;
    const over = list.total > budget;
    const cats = {};
    list.lines.forEach(l => { cats[l.category] = cats[l.category] || []; cats[l.category].push(l); });
    $('#summary').innerHTML = `
      <div class="row-between" style="margin-bottom:16px">
        <div>
          <div class="mono">Weekly cost · ${source === 'wholefoods' ? 'Whole Foods' : 'Costco'}</div>
          <div style="font-family:var(--font-financier-display);font-size:34px">${fmtMoney(list.total.toFixed(0))}</div>
        </div>
        <div class="text-right">
          <div class="mono">My budget</div>
          <div style="font-weight:600;font-size:18px">${fmtMoney(budget)}</div>
          <div style="color:${over ? '#b05a36' : '#3a7a3a'};font-size:14px;margin-top:4px">${over ? '$' + (list.total - budget).toFixed(0) + ' over' : '$' + (budget - list.total).toFixed(0) + ' under'}</div>
        </div>
      </div>
      <div class="bar" style="margin-bottom:24px"><span style="width:${Math.min(100,(list.total/budget)*100).toFixed(0)}%"></span></div>
      ${Object.entries(cats).map(([cat, lines]) => `
        <div style="margin-bottom:16px">
          <div class="mono" style="margin-bottom:6px">${escapeHtml(cat)}</div>
          ${lines.map(l => `
            <div class="row-between" style="padding:6px 0">
              <div>${escapeHtml(l.name)} <span class="muted" style="font-size:13px">— ${l.servings}× · ${l.qty.toFixed(2)} ${l.unit}</span></div>
              <div style="font-variant-numeric:tabular-nums">${fmtMoney(l.cost.toFixed(2))}</div>
            </div>
          `).join('')}
        </div>
      `).join('')}
      <div class="divider"></div>
      <button class="btn btn-primary btn-sm" id="copy-list">Copy list</button>
      <button class="btn btn-ghost btn-sm" id="email-list">Email myself</button>
    `;
    $('#copy-list').addEventListener('click', () => {
      const txt = list.lines.map(l => `${l.name} — ${l.qty.toFixed(2)} ${l.unit} (${fmtMoney(l.cost.toFixed(2))})`).join('\n');
      navigator.clipboard?.writeText(txt + `\n\nTotal: ${fmtMoney(list.total.toFixed(2))}`);
      $('#copy-list').textContent = 'Copied ✓';
      setTimeout(() => $('#copy-list').textContent = 'Copy list', 1500);
    });
    $('#email-list').addEventListener('click', () => alert('Demo: would email the list to you.'));
  };

  $$('#src button').forEach(b => b.addEventListener('click', () => {
    $$('#src button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    source = b.dataset.src;
    renderServings(); renderSummary();
  }));
  $$('#preset button').forEach(b => b.addEventListener('click', () => {
    $$('#preset button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    servings = { ...PRESETS[b.dataset.preset] };
    renderServings(); renderSummary();
  }));

  renderServings(); renderSummary();
}

// ---------- Recipes ----------
function renderRecipes(root) {
  root.innerHTML = `
    ${header('Recipes', 'Primal, simple, fast.')}
    <div class="row-wrap" style="margin-bottom:24px">
      <div class="toggle-group" id="filter">
        <button class="active" data-tag="all">All</button>
        <button data-tag="T-supportive">T-supportive</button>
        <button data-tag="Detox">Detox</button>
        <button data-tag="Quick">Quick</button>
        <button data-tag="Anti-inflammatory">Anti-inflammatory</button>
      </div>
    </div>
    <div class="grid-3" id="recipe-grid"></div>
  `;
  const renderGrid = (tag) => {
    const list = state.recipes.filter(r => tag === 'all' || r.tags.includes(tag));
    $('#recipe-grid').innerHTML = list.map(r => `
      <div class="card-white" style="cursor:pointer" data-recipe="${r.id}">
        <div class="thumb"></div>
        <div class="row-wrap" style="margin-bottom:8px;gap:6px">${r.tags.map(t => `<span class="badge">${escapeHtml(t)}</span>`).join('')}</div>
        <h4 style="margin-bottom:6px">${escapeHtml(r.name)}</h4>
        <div class="muted" style="font-size:14px">${r.time} min · ${r.ingredients.length} ingredients</div>
      </div>
    `).join('');
    $$('[data-recipe]').forEach(c => c.addEventListener('click', () => openRecipe(c.dataset.recipe)));
  };
  $$('#filter button').forEach(b => b.addEventListener('click', () => {
    $$('#filter button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    renderGrid(b.dataset.tag);
  }));
  renderGrid('all');
}

function openRecipe(id) {
  const r = state.recipes.find(x => x.id === id);
  $('#main').innerHTML = `
    ${header(r.name, `${r.time} min · ${r.tags.join(' · ')}`, '<button class="btn btn-ghost btn-sm" id="back">← Back</button>')}
    <div class="grid-2">
      <div class="card-elevated" style="padding:32px">
        <div class="thumb" style="aspect-ratio:16/10"></div>
        <h4 style="margin:24px 0 12px">Method</h4>
        <p>${escapeHtml(r.method)}</p>
      </div>
      <div class="card">
        <h4 style="margin-bottom:16px">Ingredients</h4>
        <ul class="list-clean">${r.ingredients.map(i => `<li><span class="check">✓</span><span>${escapeHtml(i)}</span></li>`).join('')}</ul>
        <div class="divider"></div>
        <button class="btn btn-primary btn-sm" id="add-grocery">Add to my grocery list</button>
      </div>
    </div>
  `;
  $('#back').addEventListener('click', () => setRoute('recipes'));
  $('#add-grocery').addEventListener('click', () => {
    $('#add-grocery').textContent = 'Added ✓';
    setTimeout(() => setRoute('food'), 700);
  });
}

// ---------- Library ----------
function renderLibrary(root) {
  root.innerHTML = `
    ${header('Light & rhythm library', 'Short reads from Caden on circadian rhythm, the light diet, detox, and sleep.')}
    <div class="row-wrap" style="margin-bottom:24px">
      <div class="toggle-group" id="lib-filter">
        <button class="active" data-tag="all">All</button>
        <button data-tag="Circadian">Circadian</button>
        <button data-tag="Nutrition">Nutrition</button>
        <button data-tag="Detox">Detox</button>
        <button data-tag="Recovery">Recovery</button>
      </div>
    </div>
    <div class="stack-16" id="lib"></div>
  `;
  const renderList = (tag) => {
    const list = state.articles.filter(a => tag === 'all' || a.tag === tag);
    $('#lib').innerHTML = list.map(a => `
      <div class="card-white" style="cursor:pointer" data-article="${a.id}">
        <span class="badge">${escapeHtml(a.tag)}</span>
        <h4 style="margin:8px 0">${escapeHtml(a.title)}</h4>
        <p class="muted">${escapeHtml(a.excerpt)}</p>
      </div>
    `).join('');
    $$('[data-article]').forEach(c => c.addEventListener('click', () => openArticle(c.dataset.article)));
  };
  $$('#lib-filter button').forEach(b => b.addEventListener('click', () => {
    $$('#lib-filter button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    renderList(b.dataset.tag);
  }));
  renderList('all');
}

function openArticle(id) {
  const a = state.articles.find(x => x.id === id);
  $('#main').innerHTML = `
    ${header(a.title, a.tag, '<button class="btn btn-ghost btn-sm" id="back">← Back</button>')}
    <div class="card-elevated" style="padding:48px;max-width:760px">
      <span class="badge badge-accent">${escapeHtml(a.tag)}</span>
      <h2 style="margin:16px 0 12px;font-family:var(--font-financier-display);font-weight:400;font-size:45px;line-height:1.11">${escapeHtml(a.title)}</h2>
      <p class="muted" style="font-size:18px;margin-bottom:24px">${escapeHtml(a.excerpt)}</p>
      <div class="divider"></div>
      <p style="font-size:18px;line-height:1.6">${escapeHtml(a.body)}</p>
    </div>
  `;
  $('#back').addEventListener('click', () => setRoute('library'));
}
</script>
