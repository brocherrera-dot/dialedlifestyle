<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Coach Console — Dialed Lifestyle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@300;400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark"></span>
      <span>Dialed Lifestyle</span>
      <span class="badge badge-cream" style="margin-left:8px">Coach console</span>
    </a>
    <div class="nav-actions">
      <a class="btn btn-link btn-sm" href="client.html">Client view ↗</a>
      <button id="reset-data" class="btn btn-ghost btn-sm" title="Reset demo data">Reset demo</button>
      <span class="avatar">CD</span>
    </div>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Today</div>
      <a data-route="overview" class="active">◐ Overview</a>
      <a data-route="calls">◔ Upcoming calls</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Practice</div>
      <a data-route="crm">◑ CRM tracker</a>
      <a data-route="payments">◒ Payments</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Tools</div>
      <a data-route="diet">◓ Diet & grocery</a>
      <a data-route="circadian">◖ Circadian scheduler</a>
      <a data-route="markers">◗ Blood markers</a>
      <a data-route="detox">◴ Detox builder</a>
    </div>
  </aside>

  <main class="main" id="main">
    <!-- routed views render here -->
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
const $ = (sel, el = document) => el.querySelector(sel);
const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));
const { fmtMoney, fmtDate, fmtTime, fmtDateLong, initials, escapeHtml,
        solarTimes, circadianSchedule, buildDetoxProtocol, DETOX_PROTOCOLS,
        FOOD_CATALOG, DEFAULT_SERVINGS, buildGroceryList, activateTabs } = window.DialedUI;

let state = window.DialedData.loadData();

function persist() { window.DialedData.saveData(state); }

// ---------- Router ----------
const routes = {
  overview: renderOverview,
  calls: renderCalls,
  crm: renderCRM,
  payments: renderPayments,
  diet: renderDiet,
  circadian: renderCircadian,
  markers: renderMarkers,
  detox: renderDetox,
};

function setRoute(name) {
  const route = routes[name] ? name : 'overview';
  history.replaceState(null, '', '#' + route);
  $$('.sidebar a').forEach(a => a.classList.toggle('active', a.dataset.route === route));
  $('#main').innerHTML = '';
  routes[route]($('#main'));
}

$$('.sidebar a').forEach(a => {
  a.addEventListener('click', (e) => { e.preventDefault(); setRoute(a.dataset.route); });
});
$('#reset-data').addEventListener('click', () => {
  if (confirm('Reset all demo data to defaults?')) {
    state = window.DialedData.resetData();
    setRoute(location.hash.replace('#','') || 'overview');
  }
});

window.addEventListener('hashchange', () => setRoute(location.hash.replace('#','')));
setRoute(location.hash.replace('#','') || 'overview');

// ---------- Views ----------

function pageHeader(title, sub, actionsHtml = '') {
  return `<div class="page-header">
    <div>
      <span class="mono" style="color:var(--color-amber-glow)">Dialed · Coach console</span>
      <h2 style="margin-top:6px">${escapeHtml(title)}</h2>
      <div class="sub">${escapeHtml(sub)}</div>
    </div>
    <div class="row-wrap">${actionsHtml}</div>
  </div>`;
}

function renderOverview(root) {
  const upcoming = [...state.clients]
    .filter(c => c.nextCall)
    .sort((a,b) => new Date(a.nextCall) - new Date(b.nextCall))
    .slice(0, 4);

  const mrr = state.payments
    .filter(p => p.status === 'paid' && p.memo.toLowerCase().includes('monthly'))
    .reduce((s, p) => s + p.amount, 0);
  const ytd = state.payments.filter(p => p.status === 'paid').reduce((s, p) => s + p.amount, 0);
  const pending = state.payments.filter(p => p.status === 'pending').reduce((s, p) => s + p.amount, 0);

  root.innerHTML = `
    ${pageHeader('Welcome back, Caden.', 'Your practice in one glance.')}
    <div class="grid-4" style="margin-bottom:24px">
      <div class="stat"><div class="stat-label">Active clients</div><div class="stat-value">${state.clients.filter(c => c.stage.startsWith('Active')).length}</div><div class="stat-delta">Total roster: ${state.clients.length}</div></div>
      <div class="stat"><div class="stat-label">MRR (recurring)</div><div class="stat-value">${fmtMoney(mrr)}</div><div class="stat-delta">From monthly retainers</div></div>
      <div class="stat"><div class="stat-label">Collected (cycle)</div><div class="stat-value">${fmtMoney(ytd)}</div><div class="stat-delta">↑ healthy</div></div>
      <div class="stat"><div class="stat-label">Pending</div><div class="stat-value">${fmtMoney(pending)}</div><div class="stat-delta">${state.payments.filter(p => p.status === 'pending').length} invoices open</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="row-between" style="margin-bottom:16px">
          <h4>Next 4 calls</h4>
          <a class="btn btn-link btn-sm" data-go="calls">See all →</a>
        </div>
        ${upcoming.map(c => `
          <div class="row-between" style="padding:12px 0;border-bottom:1px solid var(--color-warm-mist)">
            <div class="row">
              <div class="avatar">${initials(c.name)}</div>
              <div>
                <div style="font-weight:600">${escapeHtml(c.name)}</div>
                <div class="muted" style="font-size:14px">${escapeHtml(c.program)}</div>
              </div>
            </div>
            <div class="text-right">
              <div style="font-weight:600">${fmtDate(c.nextCall)}</div>
              <div class="muted" style="font-size:14px">${fmtTime(c.nextCall)}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div class="row-between" style="margin-bottom:16px">
          <h4>Pipeline by stage</h4>
          <a class="btn btn-link btn-sm" data-go="crm">Open CRM →</a>
        </div>
        ${stagesSummary()}
      </div>
    </div>

    <div style="height:24px"></div>
    <div class="card">
      <div class="row-between" style="margin-bottom:16px">
        <h4>Quick tools</h4>
      </div>
      <div class="grid-4">
        <button class="card-white" style="text-align:left;border:1px solid var(--color-warm-mist);cursor:pointer" data-go="diet">
          <span class="mono" style="color:var(--color-amber-glow)">01</span>
          <h4 style="margin:8px 0">Grocery calculator</h4>
          <p class="muted" style="font-size:14px">Build a primal weekly list — Whole Foods or Costco — against the client's budget.</p>
        </button>
        <button class="card-white" style="text-align:left;border:1px solid var(--color-warm-mist);cursor:pointer" data-go="circadian">
          <span class="mono" style="color:var(--color-amber-glow)">02</span>
          <h4 style="margin:8px 0">Circadian scheduler</h4>
          <p class="muted" style="font-size:14px">Wake / sun / sleep windows by client location and season.</p>
        </button>
        <button class="card-white" style="text-align:left;border:1px solid var(--color-warm-mist);cursor:pointer" data-go="markers">
          <span class="mono" style="color:var(--color-amber-glow)">03</span>
          <h4 style="margin:8px 0">Blood markers</h4>
          <p class="muted" style="font-size:14px">Track lab trend lines per client. Anchor goals.</p>
        </button>
        <button class="card-white" style="text-align:left;border:1px solid var(--color-warm-mist);cursor:pointer" data-go="detox">
          <span class="mono" style="color:var(--color-amber-glow)">04</span>
          <h4 style="margin:8px 0">Detox protocol builder</h4>
          <p class="muted" style="font-size:14px">Pull from 3 evidence-anchored templates. Customize per client.</p>
        </button>
      </div>
    </div>

    <div style="height:24px"></div>
    <div class="grid-2">
      <div class="card">
        <h4 style="margin-bottom:16px">Recent payments</h4>
        ${recentPaymentsTable(5)}
      </div>
      <div class="card">
        <h4 style="margin-bottom:16px">Latest client notes</h4>
        ${state.clients.slice(0,3).map(c => `
          <div style="padding:12px 0;border-bottom:1px solid var(--color-warm-mist)">
            <div class="row" style="margin-bottom:6px">
              <div class="avatar">${initials(c.name)}</div>
              <div>
                <div style="font-weight:600">${escapeHtml(c.name)}</div>
                <div class="muted" style="font-size:13px">${escapeHtml(c.stage)}</div>
              </div>
            </div>
            <div class="muted" style="font-size:14px">${escapeHtml(c.notes)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  $$('[data-go]', root).forEach(b => b.addEventListener('click', () => setRoute(b.dataset.go)));
}

function stagesSummary() {
  const groups = {};
  state.clients.forEach(c => {
    const key = c.stage.split(' — ')[0];
    groups[key] = (groups[key] || 0) + 1;
  });
  const total = state.clients.length;
  return Object.entries(groups).map(([k, v]) => `
    <div style="margin-bottom:12px">
      <div class="row-between" style="margin-bottom:6px">
        <span style="font-weight:500">${escapeHtml(k)}</span>
        <span class="muted">${v}</span>
      </div>
      <div class="bar"><span style="width: ${(v/total*100).toFixed(0)}%"></span></div>
    </div>
  `).join('');
}

function recentPaymentsTable(limit) {
  const rows = [...state.payments]
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0, limit);
  return `<table class="table">
    <thead><tr><th>Client</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
    <tbody>${rows.map(p => {
      const c = state.clients.find(x => x.id === p.clientId);
      return `<tr>
        <td>${c ? escapeHtml(c.name) : '—'}</td>
        <td>${fmtDate(p.date)}</td>
        <td>${fmtMoney(p.amount)}</td>
        <td><span class="badge ${p.status === 'paid' ? 'badge-cream' : ''}" style="${p.status==='paid'?'background:#e7d8b9':''}">${p.status}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ---------- Calls ----------
function renderCalls(root) {
  const calls = [...state.clients]
    .filter(c => c.nextCall)
    .sort((a,b) => new Date(a.nextCall) - new Date(b.nextCall));
  const grouped = {};
  calls.forEach(c => {
    const key = fmtDateLong(c.nextCall);
    grouped[key] = grouped[key] || [];
    grouped[key].push(c);
  });

  root.innerHTML = `
    ${pageHeader('Upcoming calls', 'Next 7 days · grouped by day', '<button class="btn btn-primary btn-sm" id="add-call">+ Schedule call</button>')}
    <div class="stack-24">
      ${Object.entries(grouped).map(([day, list]) => `
        <div class="card">
          <div class="row-between" style="margin-bottom:16px">
            <h4>${escapeHtml(day)}</h4>
            <span class="badge">${list.length} ${list.length === 1 ? 'call' : 'calls'}</span>
          </div>
          <div class="stack-16">
            ${list.map(c => `
              <div class="card-white row-between">
                <div class="row">
                  <div class="avatar avatar-lg">${initials(c.name)}</div>
                  <div>
                    <div style="font-weight:600;font-size:18px">${escapeHtml(c.name)}</div>
                    <div class="muted" style="font-size:14px">${escapeHtml(c.program)} · ${escapeHtml(c.city)}</div>
                  </div>
                </div>
                <div class="text-right">
                  <div style="font-family:var(--font-financier-display); font-size:24px">${fmtTime(c.nextCall)}</div>
                  <div class="muted" style="font-size:13px">${escapeHtml(c.stage)}</div>
                </div>
                <div class="row-wrap">
                  <button class="btn btn-ghost btn-sm" data-jump="${c.id}">Open chart</button>
                  <button class="btn btn-primary btn-sm">Join call</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  $('#add-call').addEventListener('click', () => alert('Demo: would open scheduling drawer.'));
  $$('[data-jump]', root).forEach(b => b.addEventListener('click', () => {
    location.hash = 'crm';
    setTimeout(() => {
      const el = document.getElementById('client-' + b.dataset.jump);
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 50);
  }));
}

// ---------- CRM ----------
function renderCRM(root) {
  root.innerHTML = `
    ${pageHeader('CRM tracker', 'Every client. Every stage. Every note.', '<button class="btn btn-primary btn-sm" id="add-client">+ Add client</button>')}
    <div class="stack-16">
      ${state.clients.map((c, i) => `
        <div class="card-white" id="client-${c.id}">
          <div class="row-between" style="align-items:flex-start; gap:24px; flex-wrap:wrap">
            <div class="row" style="gap:16px">
              <div class="avatar avatar-lg">${initials(c.name)}</div>
              <div>
                <div style="font-weight:700; font-size:20px">${escapeHtml(c.name)}</div>
                <div class="muted" style="font-size:14px">${escapeHtml(c.city)} · ${escapeHtml(c.program)}</div>
                <div style="margin-top:8px"><span class="badge badge-accent">${escapeHtml(c.stage)}</span> <span class="badge">Since ${fmtDate(c.since)}</span></div>
              </div>
            </div>
            <div class="text-right">
              <div class="mono" style="color:var(--color-faded-stone)">Next call</div>
              <div style="font-family: var(--font-financier-display); font-size: 24px">${c.nextCall ? fmtDate(c.nextCall) + ' · ' + fmtTime(c.nextCall) : '—'}</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="grid-3" style="gap:16px">
            <div>
              <div class="mono">Weight</div>
              <div style="font-weight:600; font-size:18px">${c.weight} lb</div>
            </div>
            <div>
              <div class="mono">Weekly food budget</div>
              <div style="font-weight:600; font-size:18px">${fmtMoney(c.foodBudget)}</div>
            </div>
            <div>
              <div class="mono">Detox protocol</div>
              <div style="font-weight:600; font-size:18px">${escapeHtml(c.detoxProtocol)}</div>
            </div>
          </div>
          ${c.tCurrent ? `<div style="margin-top:16px">
            <div class="mono">Testosterone goal</div>
            <div class="row" style="gap:12px;margin-top:6px">
              <div style="flex:1"><div class="bar"><span style="width:${Math.min(100, (c.tCurrent/c.tGoal)*100).toFixed(0)}%"></span></div></div>
              <div class="muted" style="font-size:14px">${c.tCurrent} → ${c.tGoal} ng/dL</div>
            </div>
          </div>` : ''}
          <div class="divider"></div>
          <div>
            <div class="mono" style="margin-bottom:6px">Coach notes</div>
            <textarea class="textarea" data-note="${c.id}" style="margin-bottom:8px">${escapeHtml(c.notes)}</textarea>
            <div class="row-wrap">
              <button class="btn btn-ghost btn-sm" data-save="${c.id}">Save note</button>
              <button class="btn btn-link btn-sm" data-tool="${c.id}-grocery">Build grocery list →</button>
              <button class="btn btn-link btn-sm" data-tool="${c.id}-circadian">Run circadian schedule →</button>
              <button class="btn btn-link btn-sm" data-tool="${c.id}-detox">View detox protocol →</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  $('#add-client').addEventListener('click', () => {
    const name = prompt('Client name?');
    if (!name) return;
    const id = name.toLowerCase().replace(/\s+/g, '-');
    state.clients.push({
      id, name, city: '—', weight: 0, foodBudget: 0,
      detoxProtocol: 'Standard Environmental Detox Protocol',
      stage: 'Lead — Discovery scheduled', since: new Date().toISOString().slice(0,10),
      nextCall: null, program: '— pending intake', notes: 'New lead.', bloodMarkers: [],
    });
    persist();
    setRoute('crm');
  });
  $$('[data-save]', root).forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.save;
    const t = $(`[data-note="${id}"]`);
    const c = state.clients.find(x => x.id === id);
    c.notes = t.value;
    persist();
    b.textContent = 'Saved ✓';
    setTimeout(() => b.textContent = 'Save note', 1500);
  }));
  $$('[data-tool]', root).forEach(b => b.addEventListener('click', () => {
    const [id, tool] = b.dataset.tool.split('-');
    sessionStorage.setItem('dialed-active-client', id);
    setRoute(tool === 'grocery' ? 'diet' : tool);
  }));
}

// ---------- Payments ----------
function renderPayments(root) {
  const totalPaid = state.payments.filter(p => p.status === 'paid').reduce((s, p) => s + p.amount, 0);
  const pending = state.payments.filter(p => p.status === 'pending').reduce((s, p) => s + p.amount, 0);
  const avg = (totalPaid / Math.max(1, state.payments.filter(p => p.status === 'paid').length)).toFixed(0);

  root.innerHTML = `
    ${pageHeader('Payments', 'Track collected, pending, and average ticket.', '<button class="btn btn-primary btn-sm" id="add-payment">+ New payment</button>')}
    <div class="grid-4" style="margin-bottom:24px">
      <div class="stat"><div class="stat-label">Collected</div><div class="stat-value">${fmtMoney(totalPaid)}</div><div class="stat-delta">${state.payments.filter(p=>p.status==='paid').length} payments</div></div>
      <div class="stat"><div class="stat-label">Pending</div><div class="stat-value">${fmtMoney(pending)}</div><div class="stat-delta">${state.payments.filter(p=>p.status==='pending').length} invoices</div></div>
      <div class="stat"><div class="stat-label">Avg ticket</div><div class="stat-value">${fmtMoney(avg)}</div><div class="stat-delta">paid · all-time</div></div>
      <div class="stat"><div class="stat-label">Active retainers</div><div class="stat-value">${state.clients.filter(c => c.stage.startsWith('Active')).length}</div><div class="stat-delta">monthly recurring</div></div>
    </div>
    <div class="card">
      ${paymentsTable()}
    </div>
  `;
  $('#add-payment').addEventListener('click', () => {
    const c = state.clients[0];
    const amt = parseFloat(prompt('Amount in $:', '750')) || 0;
    state.payments.unshift({ id: 'p' + Date.now(), clientId: c.id, amount: amt, status: 'paid', date: new Date().toISOString().slice(0,10), method: 'Stripe', memo: 'Manual entry' });
    persist();
    setRoute('payments');
  });
}

function paymentsTable() {
  const rows = [...state.payments].sort((a,b) => new Date(b.date) - new Date(a.date));
  return `<table class="table">
    <thead><tr><th>Client</th><th>Date</th><th>Memo</th><th>Method</th><th>Amount</th><th>Status</th></tr></thead>
    <tbody>${rows.map(p => {
      const c = state.clients.find(x => x.id === p.clientId);
      return `<tr>
        <td><div class="row" style="gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:12px">${c ? initials(c.name) : '?'}</div>${c ? escapeHtml(c.name) : '—'}</div></td>
        <td>${fmtDate(p.date)}</td>
        <td>${escapeHtml(p.memo)}</td>
        <td>${escapeHtml(p.method)}</td>
        <td>${fmtMoney(p.amount)}</td>
        <td><span class="badge" style="${p.status==='paid'?'background:#e7d8b9;color:#3a2a18':''}">${p.status}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ---------- Diet calculator ----------
function renderDiet(root) {
  const activeId = sessionStorage.getItem('dialed-active-client') || 'broc';
  const client = state.clients.find(c => c.id === activeId) || state.clients[0];
  let source = 'wholefoods';
  let servings = { ...DEFAULT_SERVINGS };

  root.innerHTML = `
    ${pageHeader('Diet & grocery calculator', 'Build a primal whole-foods week against the client\\'s budget.')}
    <div class="row-wrap" style="margin-bottom:24px">
      <select class="select" id="client-select" style="max-width:280px">
        ${state.clients.map(c => `<option value="${c.id}" ${c.id===client.id?'selected':''}>${escapeHtml(c.name)} — ${fmtMoney(c.foodBudget)}/wk</option>`).join('')}
      </select>
      <div class="toggle-group" id="source-toggle">
        <button class="active" data-src="wholefoods">Whole Foods</button>
        <button data-src="costco">Costco bulk</button>
      </div>
    </div>

    <div class="grid-2">
      <div class="card-white">
        <h4 style="margin-bottom:8px">Weekly servings — adjust for client</h4>
        <div class="muted" style="margin-bottom:16px;font-size:14px">Default servings reflect a primal whole-foods adult week. Adjust per client preference, training load, or budget.</div>
        <div id="servings-list" class="stack-16"></div>
      </div>

      <div class="stack-16">
        <div class="card">
          <h4 style="margin-bottom:16px">Grocery list & cost</h4>
          <div id="grocery-summary"></div>
        </div>
        <div class="card-white">
          <h4 style="margin-bottom:8px">Notes</h4>
          <p class="muted" style="font-size:14px">Costco prices reflect typical bulk/per-unit. Whole Foods prices reflect retail. Switch the toggle to compare. The cost line turns green when under the client's weekly food budget.</p>
        </div>
      </div>
    </div>
  `;

  const renderServings = () => {
    const cats = {};
    FOOD_CATALOG.forEach(item => {
      cats[item.category] = cats[item.category] || [];
      cats[item.category].push(item);
    });
    $('#servings-list').innerHTML = Object.entries(cats).map(([cat, items]) => `
      <div>
        <div class="mono" style="margin-bottom:6px">${escapeHtml(cat)}</div>
        ${items.map(item => `
          <div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--color-warm-mist)">
            <div>
              <div style="font-weight:500">${escapeHtml(item.name)}</div>
              <div class="muted" style="font-size:13px">${item.serving} ${item.unit}/serving · ${fmtMoney(item.prices[source])}/${item.unit}</div>
            </div>
            <input type="number" min="0" step="1" value="${servings[item.id] ?? 0}" data-item="${item.id}" class="input" style="max-width:90px;text-align:center;padding:6px 12px"/>
          </div>
        `).join('')}
      </div>
    `).join('');
    $$('[data-item]').forEach(i => i.addEventListener('input', () => {
      servings[i.dataset.item] = Math.max(0, parseFloat(i.value) || 0);
      renderSummary();
    }));
  };

  const renderSummary = () => {
    const list = buildGroceryList(source, servings);
    const budget = client.foodBudget;
    const overBudget = list.total > budget;
    const cats = {};
    list.lines.forEach(l => {
      cats[l.category] = cats[l.category] || [];
      cats[l.category].push(l);
    });
    $('#grocery-summary').innerHTML = `
      <div class="row-between" style="margin-bottom:16px">
        <div>
          <div class="mono">Weekly cost · ${source === 'wholefoods' ? 'Whole Foods' : 'Costco'}</div>
          <div style="font-family:var(--font-financier-display);font-size:34px">${fmtMoney(list.total.toFixed(0))}</div>
        </div>
        <div class="text-right">
          <div class="mono">Budget</div>
          <div style="font-weight:600;font-size:18px">${fmtMoney(budget)}</div>
          <div style="color:${overBudget ? '#b05a36' : '#3a7a3a'};font-size:14px;margin-top:4px">${overBudget ? '$' + (list.total - budget).toFixed(0) + ' over' : '$' + (budget - list.total).toFixed(0) + ' under'}</div>
        </div>
      </div>
      <div class="bar" style="margin-bottom:24px"><span style="width: ${Math.min(100, (list.total/budget)*100).toFixed(0)}%"></span></div>
      ${Object.entries(cats).map(([cat, lines]) => `
        <div style="margin-bottom:16px">
          <div class="mono" style="margin-bottom:6px">${escapeHtml(cat)}</div>
          ${lines.map(l => `
            <div class="row-between" style="padding:6px 0">
              <div>${escapeHtml(l.name)} <span class="muted" style="font-size:13px">— ${l.servings} servings · ${l.qty.toFixed(2)} ${l.unit}</span></div>
              <div style="font-variant-numeric: tabular-nums">${fmtMoney(l.cost.toFixed(2))}</div>
            </div>
          `).join('')}
        </div>
      `).join('')}
      <div class="divider"></div>
      <button class="btn btn-primary btn-sm" id="copy-list">Copy as text</button>
    `;
    const copy = $('#copy-list');
    if (copy) copy.addEventListener('click', () => {
      const txt = list.lines.map(l => `${l.name} — ${l.qty.toFixed(2)} ${l.unit} (${fmtMoney(l.cost.toFixed(2))})`).join('\n');
      navigator.clipboard?.writeText(txt + `\n\nTotal: ${fmtMoney(list.total.toFixed(2))}`);
      copy.textContent = 'Copied ✓';
      setTimeout(() => copy.textContent = 'Copy as text', 1500);
    });
  };

  $('#client-select').addEventListener('change', (e) => {
    sessionStorage.setItem('dialed-active-client', e.target.value);
    setRoute('diet');
  });
  $$('#source-toggle button').forEach(b => b.addEventListener('click', () => {
    $$('#source-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    source = b.dataset.src;
    renderServings();
    renderSummary();
  }));

  renderServings();
  renderSummary();
}

// ---------- Circadian scheduler ----------
function renderCircadian(root) {
  const activeId = sessionStorage.getItem('dialed-active-client') || 'broc';
  let client = state.clients.find(c => c.id === activeId) || state.clients[0];
  let chronotype = 'neutral';
  let dateStr = new Date().toISOString().slice(0, 10);

  root.innerHTML = `
    ${pageHeader('Circadian rhythm scheduler', 'Wake / sun / sleep windows by location and season.')}
    <div class="row-wrap" style="margin-bottom:24px">
      <select class="select" id="client-select" style="max-width:280px">
        ${state.clients.map(c => `<option value="${c.id}" ${c.id===client.id?'selected':''}>${escapeHtml(c.name)} · ${escapeHtml(c.city)}</option>`).join('')}
      </select>
      <input class="input" id="date" type="date" value="${dateStr}" style="max-width:200px"/>
      <div class="toggle-group" id="chrono">
        <button data-c="lark">Lark</button>
        <button class="active" data-c="neutral">Neutral</button>
        <button data-c="owl">Owl</button>
      </div>
    </div>
    <div id="circadian-out"></div>
  `;

  const render = () => {
    const date = new Date(dateStr + 'T12:00:00');
    const t = solarTimes(date, client.lat, client.lon);
    const sched = circadianSchedule(t, chronotype);
    const out = $('#circadian-out');

    const rows = [
      ['Wake (anchor)', sched.wake, 'Outside in 30 min — no sunglasses, no glass.'],
      ['Sunrise', t.sunrise, 'Direct outdoor light · 5–10 min.'],
      ['Civil dawn', t.civilDawn, 'Pre-sunrise activation window.'],
      ['Solar noon (peak sun)', t.solarNoon, 'Mid-day dose · 10–20 min skin in sun.'],
      ['Peak sun window', sched.peakSunStart, 'From this time → ' + fmtClock(sched.peakSunEnd)],
      ['Last food', sched.lastFood, '3+ hours before sleep.'],
      ['Screens off', sched.screensOff, '90 min wind-down. Dim, warm light.'],
      ['Sleep', sched.sleep, '8h target.'],
      ['Sunset', t.sunset, 'Catch the colors — calibrates evening melatonin.'],
    ];

    out.innerHTML = `
      <div class="grid-2">
        <div class="card">
          <div class="row-between" style="margin-bottom:16px">
            <div>
              <h4>Today's plan</h4>
              <div class="muted">${fmtDateLong(date)} · ${escapeHtml(client.city)}</div>
            </div>
            <span class="badge badge-accent">${chronotype}</span>
          </div>
          ${arcVisual(t, sched)}
          <div class="stack-16" style="margin-top:24px">
            ${rows.map(([label, time, note]) => `
              <div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--color-warm-mist)">
                <div>
                  <div style="font-weight:600">${escapeHtml(label)}</div>
                  <div class="muted" style="font-size:13px">${escapeHtml(note)}</div>
                </div>
                <div style="font-family:var(--font-financier-display);font-size:24px">${fmtClock(time)}</div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="stack-16">
          <div class="card">
            <h4 style="margin-bottom:12px">Why this matters</h4>
            <p class="muted">Your client's hormones, mood, and metabolism follow the photons hitting their retina. Anchor wake-time light, dose mid-day sun, and dim before bed. The schedule shifts daily as the season turns — re-pull weekly.</p>
          </div>
          <div class="card-white">
            <h4 style="margin-bottom:8px">Coach prescription card</h4>
            <p class="muted" style="margin-bottom:12px;font-size:14px">Send this to ${escapeHtml(client.name)} as today's anchor.</p>
            <ul class="list-clean">
              <li><span class="check">✓</span> Outside by ${fmtClock(sched.wake)} — no sunglasses</li>
              <li><span class="check">✓</span> Mid-day dose ${fmtClock(sched.peakSunStart)} → ${fmtClock(sched.peakSunEnd)}</li>
              <li><span class="check">✓</span> Last food before ${fmtClock(sched.lastFood)}</li>
              <li><span class="check">✓</span> Screens off ${fmtClock(sched.screensOff)}</li>
              <li><span class="check">✓</span> In bed by ${fmtClock(sched.sleep)}</li>
            </ul>
            <button class="btn btn-primary btn-sm" id="copy-rx" style="margin-top:16px">Copy prescription</button>
          </div>
        </div>
      </div>
    `;
    const copy = $('#copy-rx');
    if (copy) copy.addEventListener('click', () => {
      const txt = `Today's circadian anchor for ${client.name} (${client.city})\n` +
        `Wake/outside: ${fmtClock(sched.wake)}\n` +
        `Mid-day dose: ${fmtClock(sched.peakSunStart)}–${fmtClock(sched.peakSunEnd)}\n` +
        `Last food: ${fmtClock(sched.lastFood)}\n` +
        `Screens off: ${fmtClock(sched.screensOff)}\n` +
        `In bed: ${fmtClock(sched.sleep)}`;
      navigator.clipboard?.writeText(txt);
      copy.textContent = 'Copied ✓';
      setTimeout(() => copy.textContent = 'Copy prescription', 1500);
    });
  };

  $('#client-select').addEventListener('change', e => {
    client = state.clients.find(c => c.id === e.target.value);
    sessionStorage.setItem('dialed-active-client', client.id);
    render();
  });
  $('#date').addEventListener('change', e => { dateStr = e.target.value; render(); });
  $$('#chrono button').forEach(b => b.addEventListener('click', () => {
    $$('#chrono button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    chronotype = b.dataset.c;
    render();
  }));
  render();
}

function fmtClock(d) {
  if (!d) return '—';
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function arcVisual(t, sched) {
  // Map wake → noon → sleep across an arc
  const wake = sched.wake.getHours() + sched.wake.getMinutes()/60;
  const noon = t.solarNoon.getHours() + t.solarNoon.getMinutes()/60;
  const sleep = sched.sleep.getHours() + sched.sleep.getMinutes()/60;
  const start = 0;
  const end = 24;
  const xOf = h => ((h - start) / (end - start)) * 100;
  return `
    <div class="sun-arc">
      <svg viewBox="0 0 100 60" preserveAspectRatio="none">
        <path d="M0,55 Q50,-10 100,55" fill="none" stroke="#b05a36" stroke-width="0.6" stroke-dasharray="0.5 0.8"/>
        <line x1="${xOf(wake)}" y1="0" x2="${xOf(wake)}" y2="60" stroke="#808988" stroke-width="0.2"/>
        <line x1="${xOf(noon)}" y1="0" x2="${xOf(noon)}" y2="60" stroke="#b05a36" stroke-width="0.4"/>
        <line x1="${xOf(sleep%24)}" y1="0" x2="${xOf(sleep%24)}" y2="60" stroke="#808988" stroke-width="0.2"/>
        <circle cx="${xOf(noon)}" cy="${10}" r="2.5" fill="#b05a36"/>
      </svg>
      <div style="position:absolute; inset:auto 0 8px 0; display:flex; justify-content:space-between; padding: 0 16px; font-family: var(--font-fragment-mono); font-size: 11px; color: var(--color-charcoal-grey)">
        <span>${fmtClock(sched.wake)} · wake</span>
        <span>${fmtClock(t.solarNoon)} · peak</span>
        <span>${fmtClock(sched.sleep)} · sleep</span>
      </div>
    </div>
  `;
}

// ---------- Blood markers ----------
function renderMarkers(root) {
  const activeId = sessionStorage.getItem('dialed-active-client') || 'broc';
  let client = state.clients.find(c => c.id === activeId) || state.clients[0];

  root.innerHTML = `
    ${pageHeader('Blood markers', 'Trend lines per client. Anchor goals, not fads.')}
    <div class="row-wrap" style="margin-bottom:24px">
      <select class="select" id="client-select" style="max-width:280px">
        ${state.clients.filter(c => c.bloodMarkers && c.bloodMarkers.length).map(c => `<option value="${c.id}" ${c.id===client.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
      </select>
      <button class="btn btn-primary btn-sm" id="add-result">+ Log new lab result</button>
    </div>
    <div id="markers-out"></div>
  `;

  const render = () => {
    if (!client.bloodMarkers || !client.bloodMarkers.length) {
      $('#markers-out').innerHTML = `<div class="empty">No labs logged for this client yet.</div>`;
      return;
    }
    $('#markers-out').innerHTML = `<div class="grid-2">${
      client.bloodMarkers.map(m => markerCard(m)).join('')
    }</div>`;
  };

  $('#client-select').addEventListener('change', e => {
    client = state.clients.find(c => c.id === e.target.value);
    sessionStorage.setItem('dialed-active-client', client.id);
    render();
  });
  $('#add-result').addEventListener('click', () => {
    if (!client.bloodMarkers || !client.bloodMarkers.length) return;
    const names = client.bloodMarkers.map((m,i) => `${i+1}. ${m.name}`).join('\n');
    const which = parseInt(prompt('Which marker?\n' + names), 10) - 1;
    if (isNaN(which) || which < 0 || which >= client.bloodMarkers.length) return;
    const v = parseFloat(prompt('New value:'));
    if (isNaN(v)) return;
    client.bloodMarkers[which].history.push({ date: new Date().toISOString().slice(0,10), value: v });
    persist();
    render();
  });

  render();
}

function markerCard(m) {
  const latest = m.history[m.history.length - 1];
  const first = m.history[0];
  const delta = latest.value - first.value;
  const lower = m.lowerIsBetter;
  const onTrack = lower ? delta < 0 : delta > 0;
  const max = Math.max(...m.history.map(h => h.value), m.goal);
  const min = Math.min(...m.history.map(h => h.value), 0);

  const W = 320, H = 80, pad = 8;
  const xs = m.history.map((_, i) => pad + (i / Math.max(1, m.history.length - 1)) * (W - 2*pad));
  const yOf = v => H - pad - ((v - min) / Math.max(0.0001, (max - min))) * (H - 2*pad);
  const points = m.history.map((h, i) => `${xs[i]},${yOf(h.value)}`).join(' ');
  const goalY = yOf(m.goal);

  return `<div class="card-white">
    <div class="row-between" style="margin-bottom:8px">
      <div>
        <h4>${escapeHtml(m.name)}</h4>
        <div class="muted" style="font-size:13px">Goal: ${m.lowerIsBetter ? '< ' : '≥ '}${m.goal} ${escapeHtml(m.unit)}</div>
      </div>
      <div class="text-right">
        <div style="font-family:var(--font-financier-display);font-size:34px">${latest.value}</div>
        <div style="color:${onTrack ? '#3a7a3a' : '#b05a36'};font-size:13px">${onTrack ? '↑ on track' : 'attention'} · ${delta > 0 ? '+' : ''}${delta.toFixed(1)}</div>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px;background:var(--color-cream-canvas);border-radius:8px">
      <line x1="0" y1="${goalY}" x2="${W}" y2="${goalY}" stroke="#808988" stroke-width="0.5" stroke-dasharray="2 3"/>
      <polyline points="${points}" fill="none" stroke="#b05a36" stroke-width="2"/>
      ${m.history.map((h, i) => `<circle cx="${xs[i]}" cy="${yOf(h.value)}" r="3" fill="#b05a36"/>`).join('')}
    </svg>
    <div class="row-between muted" style="font-size:12px;margin-top:6px">
      <span>${fmtDate(first.date)}</span>
      <span>${fmtDate(latest.date)}</span>
    </div>
  </div>`;
}

// ---------- Detox builder ----------
function renderDetox(root) {
  const activeId = sessionStorage.getItem('dialed-active-client') || 'broc';
  let client = state.clients.find(c => c.id === activeId) || state.clients[0];
  let protocolName = client.detoxProtocol;

  root.innerHTML = `
    ${pageHeader('Detox protocol builder', 'Three evidence-anchored templates. Customize per client.')}
    <div class="row-wrap" style="margin-bottom:24px">
      <select class="select" id="client-select" style="max-width:280px">
        ${state.clients.map(c => `<option value="${c.id}" ${c.id===client.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
      </select>
      <select class="select" id="proto-select" style="max-width:360px">
        ${Object.keys(DETOX_PROTOCOLS).map(n => `<option value="${escapeHtml(n)}" ${n===protocolName?'selected':''}>${escapeHtml(n)}</option>`).join('')}
      </select>
      <button class="btn btn-primary btn-sm" id="assign">Assign to client</button>
    </div>
    <div id="proto-out"></div>
  `;

  const render = () => {
    const p = buildDetoxProtocol(protocolName);
    $('#proto-out').innerHTML = `
      <div class="card-elevated" style="padding:32px">
        <span class="badge badge-accent">${escapeHtml(protocolName)}</span>
        <h3 style="margin:16px 0 8px;font-family:var(--font-financier-display);font-weight:400;font-size:34px">${escapeHtml(protocolName)}</h3>
        <p class="muted" style="margin-bottom:24px;max-width:720px">${escapeHtml(p.summary)}</p>
        <div class="grid-2" style="gap:24px">
          ${p.pillars.map((pillar, idx) => `
            <div class="card-white">
              <span class="mono" style="color:var(--color-amber-glow)">Pillar ${idx + 1}</span>
              <h4 style="margin:8px 0 12px">${escapeHtml(pillar.name)}</h4>
              <ul class="list-clean">
                ${pillar.items.map(it => `<li><span class="check">✓</span><span>${escapeHtml(it)}</span></li>`).join('')}
              </ul>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:24px">
          <h4 style="margin-bottom:12px">Suggested labs</h4>
          <div class="row-wrap">
            ${p.labs.map(l => `<span class="badge">${escapeHtml(l)}</span>`).join('')}
          </div>
        </div>
      </div>
    `;
  };

  $('#client-select').addEventListener('change', e => {
    client = state.clients.find(c => c.id === e.target.value);
    sessionStorage.setItem('dialed-active-client', client.id);
    protocolName = client.detoxProtocol;
    $('#proto-select').value = protocolName;
    render();
  });
  $('#proto-select').addEventListener('change', e => { protocolName = e.target.value; render(); });
  $('#assign').addEventListener('click', () => {
    client.detoxProtocol = protocolName;
    persist();
    const btn = $('#assign');
    btn.textContent = 'Assigned ✓';
    setTimeout(() => btn.textContent = 'Assign to client', 1500);
  });

  render();
}
